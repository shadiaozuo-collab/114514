name: bundle

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - dist/**
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: ${{ github.workflow }}

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: JesseTG/rm@v1.0.3
        with:
          path: dist

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - run: pnpm install && pnpm build && node scripts/generate-inline-json.js
      - name: Only keep 角色卡示例 in dist for template upstream
        if: github.repository == 'StageDog/tavern_helper_template'
        run: |
          mv dist/角色卡示例 角色卡示例
          rm -rf dist
          mkdir dist
          mv 角色卡示例 dist/
      - name: Remove 示例 in dist for templated repository
        if: github.repository != 'StageDog/tavern_helper_template'
        run: |
          rm -rf dist/角色卡示例 dist/脚本示例 dist/流式楼层界面示例 dist/前端界面示例
      - name: Commit changes
        uses: EndBug/add-and-commit@v9.1.3
        with:
          default_author: github_actions
          message: '[bot] bundle'

      # 自动打版本 tag, 从而让 jsdelivr 基于版本号在 12h 内更新缓存而不是用非版本号的 7d 缓存
      - name: Auto Tag
        if: github.repository != 'StageDog/tavern_helper_template'
        run: |
          git fetch --tags
          # 使用版本号排序获取最新 tag，避免字母排序陷阱（v2.4.9 > v2.4.14）
          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          VERSION=${LATEST_TAG#v}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:%s || true)
          echo "Commits since last tag:"
          echo "$COMMITS"

          if echo "$COMMITS" | grep -qE '^BREAKING CHANGE|^.*!: '; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            echo "Bump: MAJOR"
          elif echo "$COMMITS" | grep -qE '^feat(\([^)]*\))?: '; then
            MINOR=$((MINOR + 1))
            PATCH=0
            echo "Bump: MINOR"
          else
            PATCH=$((PATCH + 1))
            echo "Bump: PATCH"
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New tag: $NEW_TAG"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # 避免 tag 冲突导致 workflow 失败
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists, skipping tag creation."
          else
            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"
          fi
